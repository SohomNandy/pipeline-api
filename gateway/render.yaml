services:
  - type: web
    name: pipeline-gateway
    env: python
    rootDir: gateway
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: STAGE_GATEWAY_API_KEY
        generateValue: true
      - key: STAGE_0B_URL
        sync: false
      - key: STAGE_0B_API_KEY
        sync: false
      - key: STAGE_1_URL
        sync: false
      - key: STAGE_1_API_KEY
        sync: false
      - key: STAGE_2_URL
        sync: false
      - key: STAGE_2_API_KEY
        sync: false
      - key: STAGE_3B_URL
        sync: false
      - key: STAGE_3B_API_KEY
        sync: false
      - key: STAGE_4_URL
        sync: false
      - key: STAGE_4_API_KEY
        sync: false
